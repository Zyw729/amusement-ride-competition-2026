<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>天袭中队 — 运动演示</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0d1117; color:#c8ccd4; font-family:Arial,sans-serif; overflow:hidden; }
  canvas { display:block; }
  #info {
    position:fixed; top:10px; left:50%; transform:translateX(-50%);
    background:#161b22e0; border:1px solid #30363d; border-radius:8px;
    padding:10px 20px; text-align:center; z-index:10;
  }
  #info h1 { font-size:16px; color:#e6edf3; margin:0 0 4px 0; }
  #info .phase { font-size:13px; }
  #info .scores { font-size:12px; margin-top:2px; }
  .red { color:#ff6b6b; } .blue { color:#4da6ff; }
  #legend {
    position:fixed; bottom:15px; left:50%; transform:translateX(-50%);
    background:#161b22e0; border:1px solid #30363d; border-radius:8px;
    padding:8px 16px; font-size:11px; z-index:10; display:flex; gap:24px;
  }
</style>
</head>
<body>
<div id="info">
  <h1>天袭中队 — 双环竞技跳楼机 运动演示</h1>
  <div class="phase" id="phase">加载中...</div>
  <div class="scores"><span class="red">🔴 红队: <span id="scoreRed">0</span></span> &nbsp;&nbsp; <span class="blue">🔵 蓝队: <span id="scoreBlue">0</span></span></div>
</div>
<div id="legend">
  <span class="red">● 内环(红) φ12m ↻</span>
  <span class="blue">● 外环(蓝) φ16m ↺</span>
  <span style="color:#8b949e">● 塔柱 □3m</span>
  <span style="color:#d29922">钢缆 —</span>
</div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// State
let t = 0; // time in seconds
const PI = Math.PI;

// Ring positions (heights) — normalized 0..1 within range
const Z_MIN = 5, Z_MAX = 48; // meters

function getPhase(tt) {
  // 0-90s: boarding (at bottom)
  // 90-120s: climb + spin up
  // 120-210s: combat (independent sin wave)
  // 210-225s: finale (winner up, loser down)
  // 225-255s: return
  const cycle = tt % 255;
  if (cycle < 90) return 'boarding';
  if (cycle < 120) return 'climb';
  if (cycle < 210) return 'combat';
  if (cycle < 225) return 'finale';
  return 'return';
}

function getRingHeights(tt) {
  const cycle = tt % 255;
  // Height in meters
  let zRed = 5, zBlue = 5;

  if (cycle < 90) {
    // boarding — both at bottom
    zRed = 5; zBlue = 5;
  } else if (cycle < 120) {
    // climb — both rise together
    const p = (cycle - 90) / 30; // 0..1
    zRed = 5 + p * 15;
    zBlue = 5 + p * 15;
  } else if (cycle < 210) {
    // combat — independent sinusoidal motion
    const ct = (cycle - 120) / 90; // 0..1 over combat phase
    const mid = 27.5;
    const amp = 12.5;
    zRed = mid + amp * Math.sin(ct * PI * 4 + PI/2);  // start from top
    zBlue = mid + amp * Math.sin(ct * PI * 4 - PI/2); // start from bottom, opposite phase

    // Simulate weak-side compensation
    const scoreRed = Math.floor(100 + 30 * Math.sin(tt * 0.7));
    const scoreBlue = Math.floor(100 + 30 * Math.sin(tt * 0.7 + 1.5));
    if (Math.abs(scoreRed - scoreBlue) > 25) {
      if (scoreRed > scoreBlue) { zRed -= 5; zBlue += 5; }
      else { zBlue -= 5; zRed += 5; }
    }
  } else if (cycle < 225) {
    // finale — red wins, goes up; blue loses, goes down
    const p = (cycle - 210) / 15;
    zRed = 35 + p * 13; // up to 48
    zBlue = 35 - p * 27; // down to 8
  } else {
    // return — both descend
    const p = (cycle - 225) / 30;
    zRed = 48 - p * 43;
    zBlue = 8 - p * 3;
  }
  return [zRed, zBlue];
}

function getSpinSpeeds(tt) {
  const cycle = tt % 255;
  let wRed = 0, wBlue = 0; // rad/s
  if (cycle < 90) { wRed = 0; wBlue = 0; }
  else if (cycle < 120) {
    const p = (cycle - 90) / 30;
    wRed = p * 0.838; // to 8rpm
    wBlue = p * 0.838;
  } else if (cycle < 210) {
    wRed = 0.838; // 8rpm
    wBlue = 0.838;
  } else if (cycle < 225) {
    wRed = 0.4;
    wBlue = 0.4;
  } else {
    const p = (cycle - 225) / 30;
    wRed = 0.4 * (1 - p);
    wBlue = 0.4 * (1 - p);
  }
  return [wRed, wBlue];
}

let angleRed = 0, angleBlue = 0;

function draw() {
  requestAnimationFrame(draw);
  t += 0.016; // ~60fps

  const [zRed, zBlue] = getRingHeights(t);
  const [wRed, wBlue] = getSpinSpeeds(t);

  angleRed += wRed * 0.016;
  angleBlue -= wBlue * 0.016; // opposite direction

  const phase = getPhase(t);
  const phaseNames = {
    boarding: '上下客 — 两环在站台, 静止',
    climb: '爬升预热 — 上升+旋转加速, 练习射击',
    combat: '战斗阶段 — 独立升降+旋转, 激光对射!',
    finale: '终局 — 胜冲顶 / 败急降',
    return: '返航 — 缓降, 显示排名'
  };
  document.getElementById('phase').textContent = phaseNames[phase] || '';
  document.getElementById('scoreRed').textContent = Math.floor(90 + 30 * Math.sin(t * 0.7));
  document.getElementById('scoreBlue').textContent = Math.floor(85 + 30 * Math.sin(t * 0.7 + 1.2));

  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // ===== TOP-DOWN VIEW (left 60%) =====
  const cx = W * 0.35, cy = H * 0.45;
  const scale = Math.min(W * 0.32, H * 0.42) / 260; // scale factor

  // Ground / safety fence
  ctx.strokeStyle = '#1a2030';
  ctx.lineWidth = 2;
  ctx.setLineDash([4, 8]);
  ctx.beginPath();
  ctx.arc(cx, cy, 220 * scale, 0, PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);

  // Title
  ctx.fillStyle = '#e6edf3';
  ctx.font = 'bold 13px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('俯视图', cx, cy - 195 * scale);

  // Outer ring (blue)
  const outerR = 160 * scale;
  ctx.strokeStyle = '#4da6ff88';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(cx, cy, outerR, 0, PI * 2);
  ctx.stroke();

  // Inner ring (red)
  const innerR = 120 * scale;
  ctx.strokeStyle = '#ff6b6b88';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(cx, cy, innerR, 0, PI * 2);
  ctx.stroke();

  // Battle gap indicator
  ctx.strokeStyle = '#d2992244';
  ctx.lineWidth = 1;
  ctx.setLineDash([2, 4]);
  ctx.beginPath();
  ctx.arc(cx, cy, 140 * scale, 0, PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);

  // Tower
  const towerW = 30 * scale;
  ctx.fillStyle = '#3a4454';
  ctx.strokeStyle = '#6e7d95';
  ctx.lineWidth = 2;
  ctx.fillRect(cx - towerW/2, cy - towerW/2, towerW, towerW);
  ctx.strokeRect(cx - towerW/2, cy - towerW/2, towerW, towerW);
  ctx.fillStyle = '#e6edf3';
  ctx.font = `${Math.max(7, 8)}px Arial`;
  ctx.fillText('塔', cx, cy + 4);

  // Inner ring capsules (red, facing outward)
  for (let i = 0; i < 10; i++) {
    const a = angleRed + i * PI * 2 / 10;
    const x = cx + innerR * Math.cos(a);
    const y = cy + innerR * Math.sin(a);

    // Capsule body
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(a);
    ctx.fillStyle = '#4a1515';
    ctx.strokeStyle = '#ff6b6b';
    ctx.lineWidth = 1.5;
    ctx.fillRect(-10, -6, 20, 12);
    ctx.strokeRect(-10, -6, 20, 12);

    // Direction arrow (facing outward)
    ctx.fillStyle = '#ff6b6b';
    ctx.beginPath();
    ctx.moveTo(10, -4);
    ctx.lineTo(14, 0);
    ctx.lineTo(10, 4);
    ctx.fill();
    ctx.restore();
  }

  // Outer ring capsules (blue, facing inward)
  for (let i = 0; i < 10; i++) {
    const a = angleBlue + i * PI * 2 / 10 + PI / 10; // offset
    const x = cx + outerR * Math.cos(a);
    const y = cy + outerR * Math.sin(a);

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(a + PI); // face inward
    ctx.fillStyle = '#1a3a5c';
    ctx.strokeStyle = '#4da6ff';
    ctx.lineWidth = 1.5;
    ctx.fillRect(-10, -6, 20, 12);
    ctx.strokeRect(-10, -6, 20, 12);

    // Direction arrow (facing inward)
    ctx.fillStyle = '#4da6ff';
    ctx.beginPath();
    ctx.moveTo(10, -4);
    ctx.lineTo(14, 0);
    ctx.lineTo(10, 4);
    ctx.fill();
    ctx.restore();
  }

  // Rotation indicators
  ctx.fillStyle = '#ff6b6b66';
  ctx.font = `${Math.max(9, 11)}px Arial`;
  ctx.fillText('↻', cx + innerR + 12, cy - 2);
  ctx.fillStyle = '#4da6ff66';
  ctx.fillText('↺', cx + outerR + 12, cy - 2);

  // ===== ELEVATION VIEW (right 40%) =====
  const ex = W * 0.72, eb = H * 0.82, et = H * 0.08;
  const eh = eb - et;
  const escale = eh / 55; // 55m visible range

  // Title
  ctx.fillStyle = '#e6edf3';
  ctx.font = 'bold 13px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('正视图', ex, et - 12);

  // Tower
  const tx = ex - 12 * escale;
  ctx.fillStyle = '#2a3040';
  ctx.strokeStyle = '#6e7d95';
  ctx.lineWidth = 2;
  ctx.fillRect(tx, et, 24 * escale, eh);
  ctx.strokeRect(tx, et, 24 * escale, eh);

  // Top platform
  ctx.fillStyle = '#4a5568';
  ctx.fillRect(tx - 10 * escale, et - 5, 44 * escale, 8);

  // Guide rails on front face
  ctx.strokeStyle = '#ff6b6b';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(tx + 6 * escale, et);
  ctx.lineTo(tx + 6 * escale, eb);
  ctx.stroke();

  ctx.strokeStyle = '#4da6ff';
  ctx.beginPath();
  ctx.moveTo(tx + 18 * escale, et);
  ctx.lineTo(tx + 18 * escale, eb);
  ctx.stroke();

  // Ground
  ctx.strokeStyle = '#30363d';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(ex - 80 * escale, eb);
  ctx.lineTo(ex + 80 * escale, eb);
  ctx.stroke();

  // Height mapping: z meters → y pixels from bottom
  function zToY(z) { return eb - (z / 55) * eh; }

  // Sheave position
  const sy = zToY(50);

  // === OUTER RING (BLUE) ===
  const zBlueY = zToY(zBlue);

  // Cable to blue carriage (vertical from sheave)
  ctx.strokeStyle = '#4da6ff66';
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(ex + 40 * escale, sy);
  ctx.lineTo(ex + 40 * escale, zBlueY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Blue carriage
  ctx.fillStyle = '#1a3050';
  ctx.strokeStyle = '#4da6ff';
  ctx.lineWidth = 2;
  ctx.fillRect(ex + 5 * escale, zBlueY - 6, 70 * escale, 14);
  ctx.strokeRect(ex + 5 * escale, zBlueY - 6, 70 * escale, 14);

  // Blue ring truss
  const brY = zBlueY + 10;
  ctx.fillStyle = '#4da6ff';
  ctx.fillRect(ex - 10 * escale, brY, 100 * escale, 5);

  // Blue capsules (on edges)
  ctx.fillStyle = '#1a3a5c';
  ctx.strokeStyle = '#4da6ff';
  ctx.lineWidth = 1.5;
  ctx.fillRect(ex - 20 * escale, brY - 18, 22, 14);
  ctx.strokeRect(ex - 20 * escale, brY - 18, 22, 14);
  ctx.fillStyle = '#4da6ff';
  ctx.font = '7px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('蓝', ex - 9 * escale, brY - 8);

  ctx.fillStyle = '#1a3a5c';
  ctx.strokeStyle = '#4da6ff';
  ctx.fillRect(ex + 78 * escale, brY - 18, 22, 14);
  ctx.strokeRect(ex + 78 * escale, brY - 18, 22, 14);
  ctx.fillStyle = '#4da6ff';
  ctx.fillText('蓝', ex + 89 * escale, brY - 8);

  // === INNER RING (RED) ===
  const zRedY = zToY(zRed);

  // Cable to red carriage (vertical from sheave)
  ctx.strokeStyle = '#ff6b6b66';
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(ex + 25 * escale, sy);
  ctx.lineTo(ex + 25 * escale, zRedY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Red carriage
  ctx.fillStyle = '#3a1a1a';
  ctx.strokeStyle = '#ff6b6b';
  ctx.lineWidth = 2;
  ctx.fillRect(ex + 15 * escale, zRedY - 5, 50 * escale, 12);
  ctx.strokeRect(ex + 15 * escale, zRedY - 5, 50 * escale, 12);

  // Red ring truss
  const rrY = zRedY + 9;
  ctx.fillStyle = '#ff6b6b';
  ctx.fillRect(ex + 5 * escale, rrY, 70 * escale, 4);

  // Red capsules
  ctx.fillStyle = '#4a1515';
  ctx.strokeStyle = '#ff6b6b';
  ctx.lineWidth = 1.5;
  ctx.fillRect(ex - 5 * escale, rrY - 18, 22, 14);
  ctx.strokeRect(ex - 5 * escale, rrY - 18, 22, 14);
  ctx.fillStyle = '#ff6b6b';
  ctx.fillText('红', ex + 6 * escale, rrY - 8);

  ctx.fillStyle = '#4a1515';
  ctx.strokeStyle = '#ff6b6b';
  ctx.fillRect(ex + 63 * escale, rrY - 18, 22, 14);
  ctx.strokeRect(ex + 63 * escale, rrY - 18, 22, 14);
  ctx.fillText('红', ex + 74 * escale, rrY - 8);

  // Height labels
  ctx.fillStyle = '#d29922';
  ctx.font = '9px Arial';
  ctx.textAlign = 'left';
  ctx.fillText('50m', ex + 50 * escale, zToY(50) + 4);
  ctx.fillText(' 0m', ex + 50 * escale, zToY(0) + 4);

  // Red ring height label
  ctx.fillStyle = '#ff6b6b';
  ctx.font = 'bold 10px Arial';
  ctx.textAlign = 'right';
  const zRedLabel = Math.round(zRed) + 'm';
  ctx.fillText(zRedLabel, tx - 5, zRedY + 3);

  // Blue ring height label
  ctx.fillStyle = '#4da6ff';
  ctx.fillText(Math.round(zBlue) + 'm', tx - 5, zBlueY + 3);

  // Station
  ctx.fillStyle = '#2a3040';
  ctx.strokeStyle = '#586478';
  ctx.lineWidth = 1;
  ctx.fillRect(ex + 60 * escale, eb - 20, 50 * escale, 20);
  ctx.strokeRect(ex + 60 * escale, eb - 20, 50 * escale, 20);
  ctx.fillStyle = '#8b949e';
  ctx.font = '8px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('站台', ex + 85 * escale, eb - 6);
}

draw();
</script>
</body>
</html>
