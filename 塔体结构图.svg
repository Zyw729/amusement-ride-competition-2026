<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" style="background:#1a1d23;font-family:Arial,sans-serif">
  <defs>
    <style>
      text { fill: #c8ccd4; font-size: 13px; }
      .title { fill: #ffffff; font-size: 18px; font-weight: bold; }
      .label { fill: #a0a8b4; font-size: 12px; }
      .dim { fill: #f0a040; font-size: 11px; }
      .red { fill: #ff6b6b; }
      .blue { fill: #4da6ff; }
      .steel { fill: #8a9bb5; }
    </style>
  </defs>

  <!-- ========== TITLE ========== -->
  <text x="600" y="30" text-anchor="middle" class="title">天袭中队 — 中央塔体结构详图 (□3m×3m 钢管桁架, H=50m)</text>

  <!-- ========== LEFT: 3D ISOMETRIC VIEW ========== -->
  <g transform="translate(280,60)">
    <text x="0" y="0" class="title" font-size="14">▲ 等轴测示意 (塔体中段)</text>

    <!-- Back columns (darker) -->
    <line x1="200" y1="60" x2="200" y2="380" stroke="#5a6a80" stroke-width="4"/>
    <line x1="0" y1="120" x2="0" y2="440" stroke="#5a6a80" stroke-width="4"/>

    <!-- Front columns -->
    <line x1="240" y1="180" x2="240" y2="500" stroke="#aabbcc" stroke-width="8"/>
    <line x1="40" y1="240" x2="40" y2="560" stroke="#aabbcc" stroke-width="8"/>

    <!-- Right column -->
    <line x1="280" y1="120" x2="280" y2="440" stroke="#7a8ea0" stroke-width="6"/>

    <!-- Bottom base square -->
    <polygon points="200,380 240,500 40,560 0,440" fill="none" stroke="#aabbcc" stroke-width="3"/>
    <!-- Top square -->
    <polygon points="200,60 280,120 280,120 240,180 40,240 0,120" fill="none" stroke="#aabbcc" stroke-width="2"/>

    <!-- Horizontal braces -->
    <line x1="200" y1="140" x2="240" y2="260" stroke="#6a7a90" stroke-width="2"/>
    <line x1="200" y1="140" x2="0" y1="200" stroke="#6a7a90" stroke-width="2"/>
    <line x1="240" y1="260" x2="40" y2="320" stroke="#6a7a90" stroke-width="2"/>
    <line x1="0" y1="200" x2="40" y2="320" stroke="#6a7a90" stroke-width="2"/>

    <line x1="200" y1="220" x2="240" y2="340" stroke="#6a7a90" stroke-width="2"/>
    <line x1="200" y1="220" x2="0" y1="280" stroke="#6a7a90" stroke-width="2"/>
    <line x1="240" y1="340" x2="40" y2="400" stroke="#6a7a90" stroke-width="2"/>
    <line x1="0" y1="280" x2="40" y2="400" stroke="#6a7a90" stroke-width="2"/>

    <!-- Diagonal braces -->
    <line x1="200" y1="140" x2="0" y1="280" stroke="#4a5a6a" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="240" y1="260" x2="40" y2="400" stroke="#4a5a6a" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="0" y1="200" x2="240" y2="340" stroke="#4a5a6a" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="200" y1="220" x2="40" y2="320" stroke="#4a5a6a" stroke-width="1.5" stroke-dasharray="4,3"/>

    <!-- Column labels -->
    <text x="250" y="340" class="steel" font-size="12" font-weight="bold">主管 φ610×20</text>
    <line x1="250" y1="330" x2="242" y2="310" stroke="#8a9bb5" stroke-width="1"/>

    <!-- Dimension: 3m -->
    <line x1="200" y1="405" x2="40" y2="585" stroke="#f0a040" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="105" y="505" class="dim">□3m × 3m</text>

    <!-- Guide rails on front face -->
    <line x1="210" y1="215" x2="210" y2="470" stroke="#4da6ff" stroke-width="3"/>
    <line x1="225" y1="215" x2="225" y2="470" stroke="#ff6b6b" stroke-width="3"/>

    <text x="200" y="490" font-size="10" fill="#4da6ff">外环导轨</text>
    <text x="200" y="502" font-size="10" fill="#ff6b6b">内环导轨</text>

    <!-- Bracket callout -->
    <rect x="350" y="220" width="160" height="85" rx="4" fill="#2a2d33" stroke="#4a5568" stroke-width="1"/>
    <text x="365" y="240" font-size="11" fill="#fff">牛腿 (短伸臂支架)</text>
    <text x="365" y="256" font-size="10" fill="#a0a8b4">焊在横杆上</text>
    <text x="365" y="272" font-size="10" fill="#a0a8b4">向导轨方向伸出</text>
    <text x="365" y="288" font-size="10" fill="#a0a8b4">导轨螺栓固定在牛腿上</text>
    <line x1="350" y1="250" x2="228" y2="245" stroke="#4a5568" stroke-width="1"/>
  </g>

  <!-- ========== RIGHT: TOP-DOWN SECTION ========== -->
  <g transform="translate(40,70)">
    <text x="0" y="0" class="title" font-size="14">▼ 俯视截面 (塔柱 + 导轨 + 两环滑架)</text>

    <!-- Tower column: 3x3 square -->
    <rect x="20" y="80" width="200" height="200" fill="#2a3040" stroke="#6a7a90" stroke-width="3" rx="2"/>

    <!-- 4 main columns -->
    <circle cx="20" cy="80" r="8" fill="#4a5568" stroke="#aabbcc" stroke-width="2"/>
    <circle cx="220" cy="80" r="8" fill="#4a5568" stroke="#aabbcc" stroke-width="2"/>
    <circle cx="20" cy="280" r="8" fill="#4a5568" stroke="#aabbcc" stroke-width="2"/>
    <circle cx="220" cy="280" r="8" fill="#4a5568" stroke="#aabbcc" stroke-width="2"/>

    <text x="15" y="65" font-size="10" fill="#aabbcc">主管 (φ610)</text>

    <!-- Inner ring guide rails (red) - 4 faces, closer to tower -->
    <!-- North -->
    <rect x="105" y="72" width="30" height="8" fill="#ff6b6b" rx="1"/>
    <text x="108" y="70" font-size="9" fill="#ff6b6b">内轨</text>
    <!-- South -->
    <rect x="105" y="280" width="30" height="8" fill="#ff6b6b" rx="1"/>
    <text x="108" y="302" font-size="9" fill="#ff6b6b">内轨</text>
    <!-- East -->
    <rect x="232" y="165" width="8" height="30" fill="#ff6b6b" rx="1"/>
    <text x="242" y="183" font-size="9" fill="#ff6b6b">内轨</text>
    <!-- West -->
    <rect x="0" y="165" width="8" height="30" fill="#ff6b6b" rx="1"/>
    <text x="-55" y="183" font-size="9" fill="#ff6b6b">内轨</text>

    <!-- Outer ring guide rails (blue) - 4 faces, further from tower -->
    <rect x="135" y="72" width="30" height="8" fill="#4da6ff" rx="1"/>
    <text x="138" y="70" font-size="9" fill="#4da6ff">外轨</text>
    <rect x="75" y="72" width="30" height="8" fill="#4da6ff" rx="1"/>
    <text x="78" y="70" font-size="9" fill="#4da6ff">外轨</text>

    <rect x="135" y="280" width="30" height="8" fill="#4da6ff" rx="1"/>
    <rect x="75" y="280" width="30" height="8" fill="#4da6ff" rx="1"/>

    <rect x="232" y="135" width="8" height="30" fill="#4da6ff" rx="1"/>
    <rect x="232" y="195" width="8" height="30" fill="#4da6ff" rx="1"/>

    <rect x="0" y="135" width="8" height="30" fill="#4da6ff" rx="1"/>
    <rect x="0" y="195" width="8" height="30" fill="#4da6ff" rx="1"/>

    <!-- Inner ring sliding carriage -->
    <rect x="16" y="72" width="208" height="216" fill="none" stroke="#ff6b6b" stroke-width="3" rx="2" stroke-dasharray="8,4"/>
    <text x="120" y="70" text-anchor="middle" font-size="11" fill="#ff6b6b" font-weight="bold">内环滑架 (红队)</text>

    <!-- Outer ring sliding carriage -->
    <rect x="-4" y="64" width="248" height="232" fill="none" stroke="#4da6ff" stroke-width="3" rx="2" stroke-dasharray="8,4"/>
    <text x="120" y="56" text-anchor="middle" font-size="11" fill="#4da6ff" font-weight="bold">外环滑架 (蓝队)</text>

    <!-- Rollers callout -->
    <circle cx="20" cy="176" r="5" fill="#ff6b6b"/>
    <circle cx="220" cy="176" r="5" fill="#ff6b6b"/>
    <circle cx="120" cy="80" r="5" fill="#4da6ff"/>
    <circle cx="120" cy="280" r="5" fill="#4da6ff"/>

    <text x="30" y="180" font-size="9" fill="#ff6b6b">滚轮 (内环, 8组)</text>
    <text x="130" y="92" font-size="9" fill="#4da6ff">滚轮 (外环, 8组)</text>

    <!-- Inner ring truss -->
    <rect x="-55" y="15" width="350" height="330" fill="none" stroke="#ff6b6b" stroke-width="2" rx="175" opacity="0.4"/>
    <text x="120" y="340" text-anchor="middle" font-size="11" fill="#ff6b6b">内环桁架 φ12m (红队 ↻)</text>

    <!-- Outer ring truss -->
    <rect x="-95" y="-25" width="430" height="410" fill="none" stroke="#4da6ff" stroke-width="2" rx="205" opacity="0.4"/>
    <text x="120" y="395" text-anchor="middle" font-size="11" fill="#4da6ff">外环桁架 φ16m (蓝队 ↺)</text>

    <!-- Key dimensions -->
    <!-- Tower width -->
    <line x1="20" y1="295" x2="220" y2="295" stroke="#f0a040" stroke-width="1"/>
    <text x="120" y="310" text-anchor="middle" class="dim">□3m</text>

    <!-- Inner ring dia -->
    <line x1="120" y1="80" x2="120" y2="15" stroke="#f0a040" stroke-width="0.8" stroke-dasharray="3,2"/>
    <text x="130" y="45" class="dim">R=6m</text>

    <!-- Outer ring dia -->
    <line x1="230" y1="180" x2="330" y2="180" stroke="#f0a040" stroke-width="0.8" stroke-dasharray="3,2"/>
    <text x="270" y="173" class="dim">R=8m</text>
  </g>

  <!-- ========== BOTTOM: SIDE VIEW OF ONE FACE ========== -->
  <g transform="translate(40,520)">
    <text x="0" y="0" class="title" font-size="14">▼ 侧视：一个面上的结构 (例如北面)</text>

    <!-- Two main columns -->
    <rect x="130" y="20" width="12" height="330" fill="#4a5568" stroke="#aabbcc" stroke-width="1.5"/>
    <rect x="330" y="20" width="12" height="330" fill="#4a5568" stroke="#aabbcc" stroke-width="1.5"/>

    <!-- Horizontal braces -->
    <line x1="136" y1="20" x2="342" y2="20" stroke="#6a7a90" stroke-width="2"/>
    <line x1="136" y1="70" x2="342" y2="70" stroke="#6a7a90" stroke-width="2"/>
    <line x1="136" y1="120" x2="342" y2="120" stroke="#6a7a90" stroke-width="2"/>
    <line x1="136" y1="170" x2="342" y2="170" stroke="#6a7a90" stroke-width="2"/>
    <line x1="136" y1="220" x2="342" y2="220" stroke="#6a7a90" stroke-width="2"/>
    <line x1="136" y1="270" x2="342" y2="270" stroke="#6a7a90" stroke-width="2"/>
    <line x1="136" y1="320" x2="342" y2="320" stroke="#6a7a90" stroke-width="2"/>

    <!-- Diagonal braces -->
    <line x1="136" y1="20" x2="342" y2="70" stroke="#4a5a6a" stroke-width="1.5"/>
    <line x1="342" y1="70" x2="136" y2="120" stroke="#4a5a6a" stroke-width="1.5"/>
    <line x1="136" y1="120" x2="342" y2="170" stroke="#4a5a6a" stroke-width="1.5"/>
    <line x1="342" y1="170" x2="136" y2="220" stroke="#4a5a6a" stroke-width="1.5"/>
    <line x1="136" y1="220" x2="342" y2="270" stroke="#4a5a6a" stroke-width="1.5"/>
    <line x1="342" y1="270" x2="136" y2="320" stroke="#4a5a6a" stroke-width="1.5"/>

    <!-- Guide rails (mounted via brackets) -->
    <!-- Inner guide rail -->
    <line x1="195" y1="15" x2="195" y2="335" stroke="#ff6b6b" stroke-width="4"/>
    <!-- Outer guide rail -->
    <line x1="275" y1="15" x2="275" y2="335" stroke="#4da6ff" stroke-width="4"/>

    <!-- Brackets (small horizontal lines connecting rail to brace) -->
    <line x1="142" y1="70" x2="195" y2="70" stroke="#8a9bb5" stroke-width="1.5"/>
    <line x1="142" y1="120" x2="195" y2="120" stroke="#8a9bb5" stroke-width="1.5"/>
    <line x1="142" y1="170" x2="195" y2="170" stroke="#8a9bb5" stroke-width="1.5"/>
    <line x1="142" y1="220" x2="195" y2="220" stroke="#8a9bb5" stroke-width="1.5"/>
    <line x1="142" y1="270" x2="195" y2="270" stroke="#8a9bb5" stroke-width="1.5"/>
    <line x1="142" y1="320" x2="195" y2="320" stroke="#8a9bb5" stroke-width="1.5"/>

    <line x1="336" y1="70" x2="275" y2="70" stroke="#8a9bb5" stroke-width="1.5"/>
    <line x1="336" y1="120" x2="275" y2="120" stroke="#8a9bb5" stroke-width="1.5"/>
    <line x1="336" y1="170" x2="275" y2="170" stroke="#8a9bb5" stroke-width="1.5"/>
    <line x1="336" y1="220" x2="275" y2="220" stroke="#8a9bb5" stroke-width="1.5"/>
    <line x1="336" y1="270" x2="275" y2="270" stroke="#8a9bb5" stroke-width="1.5"/>
    <line x1="336" y1="320" x2="275" y2="320" stroke="#8a9bb5" stroke-width="1.5"/>

    <!-- Dimension: brace spacing -->
    <line x1="130" y1="70" x2="120" y2="70" stroke="#f0a040" stroke-width="0.8"/>
    <line x1="130" y1="120" x2="120" y2="120" stroke="#f0a040" stroke-width="0.8"/>
    <text x="105" y="98" class="dim" text-anchor="end">间距</text>
    <text x="105" y="110" class="dim" text-anchor="end">3m</text>

    <!-- Labels -->
    <text x="196" y="355" text-anchor="middle" font-size="11" fill="#ff6b6b" font-weight="bold">内环导轨</text>
    <text x="276" y="355" text-anchor="middle" font-size="11" fill="#4da6ff" font-weight="bold">外环导轨</text>
    <text x="142" y="375" text-anchor="middle" font-size="9" fill="#8a9bb5">牛腿焊在横杆上</text>

    <!-- Rolling carriage on inner rail -->
    <rect x="180" y="90" width="30" height="50" fill="none" stroke="#ff6b6b" stroke-width="2" rx="3"/>
    <circle cx="185" cy="100" r="3" fill="#ff6b6b"/>
    <circle cx="205" cy="100" r="3" fill="#ff6b6b"/>
    <circle cx="185" cy="130" r="3" fill="#ff6b6b"/>
    <circle cx="205" cy="130" r="3" fill="#ff6b6b"/>
    <text x="215" y="118" font-size="9" fill="#ff6b6b">内环滑架(局部)</text>

    <!-- Rolling carriage on outer rail -->
    <rect x="260" y="140" width="30" height="50" fill="none" stroke="#4da6ff" stroke-width="2" rx="3"/>
    <circle cx="265" cy="150" r="3" fill="#4da6ff"/>
    <circle cx="285" cy="150" r="3" fill="#4da6ff"/>
    <circle cx="265" cy="180" r="3" fill="#4da6ff"/>
    <circle cx="285" cy="180" r="3" fill="#4da6ff"/>
    <text x="295" y="168" font-size="9" fill="#4da6ff">外环滑架(局部)</text>
  </g>

  <!-- ========== ANNOTATIONS ========== -->
  <g transform="translate(680,430)">
    <rect x="0" y="0" width="480" height="400" rx="6" fill="#252830" stroke="#4a5568" stroke-width="1"/>

    <text x="20" y="25" font-size="14" fill="#fff" font-weight="bold">📋 结构要点</text>

    <text x="20" y="55" fill="#a0a8b4" font-size="12">1. 塔柱由4根主管(φ610×20) + 横杆/斜杆(φ245×10)构成桁架</text>
    <text x="20" y="80" fill="#a0a8b4" font-size="12">2. 横杆间距3m, 共约17层 (50m/3m), 斜杆交叉焊接</text>
    <text x="20" y="105" fill="#a0a8b4" font-size="12">3. 每面横杆上焊有牛腿, 牛腿上用螺栓固定导轨</text>
    <text x="20" y="130" fill="#a0a8b4" font-size="12">4. 每面2条导轨: 内环导轨(靠里) + 外环导轨(靠外)</text>
    <text x="20" y="155" fill="#a0a8b4" font-size="12">5. 4个面 × 2条 = 8条导轨, 全长连续, 顶部至底部</text>

    <text x="20" y="195" fill="#fff" font-size="14" font-weight="bold">🔄 运动原理</text>

    <text x="20" y="225" fill="#a0a8b4" font-size="12">• 每环各有一个滑架(方框), 套在塔柱外面</text>
    <text x="20" y="250" fill="#a0a8b4" font-size="12">• 内环滑架在内, 滚轮卡4条内环导轨</text>
    <text x="20" y="275" fill="#a0a8b4" font-size="12">• 外环滑架在外, 滚轮卡4条外环导轨</text>
    <text x="20" y="300" fill="#a0a8b4" font-size="12">• 两个滑架互不干涉, 各自独立升降</text>
    <text x="20" y="325" fill="#a0a8b4" font-size="12">• 滑架下方通过回转支承连接环体桁架</text>
    <text x="20" y="350" fill="#a0a8b4" font-size="12">• 钢缆连接滑架 → 塔顶滑轮 → 地面卷扬机</text>
    <text x="20" y="375" fill="#a0a8b4" font-size="12">• 卷扬机收放 → 滑架沿导轨升降 → 环体跟着升降</text>
  </g>

  <!-- Footer -->
  <text x="600" y="890" text-anchor="middle" class="label">天袭中队 竞赛项目 | 中南大学 | 中央塔体 + 导轨 + 滑架 结构详图 | 在浏览器中打开查看</text>
</svg>
